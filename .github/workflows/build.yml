name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: l64tool-linux-x86_64
          path: target/release/l64tool

  build-linux-aarch64:
    name: Linux aarch64 (static/musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install cross
        run: |
          curl -fsSL "https://github.com/cross-rs/cross/releases/download/v0.2.5/cross-x86_64-unknown-linux-musl.tar.gz" | tar xz -C /tmp
          sudo mv /tmp/cross /usr/local/bin/
      - run: cross build --release --target aarch64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: l64tool-linux-aarch64
          path: target/aarch64-unknown-linux-musl/release/l64tool

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: l64tool-windows-x86_64
          path: target/release/l64tool.exe
