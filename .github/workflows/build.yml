name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo clippy -- -D warnings
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: l64tool-linux-x86_64
          path: target/release/l64tool

  build-linux-aarch64:
    name: Linux aarch64 (static/musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - name: Install aarch64-linux-musl cross-compiler
        run: |
          wget -q https://musl.cc/aarch64-linux-musl-cross.tgz
          tar xf aarch64-linux-musl-cross.tgz
          echo "$PWD/aarch64-linux-musl-cross/bin" >> $GITHUB_PATH
      - run: cargo build --release --target aarch64-unknown-linux-musl
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
          CC_aarch64_unknown_linux_musl: aarch64-linux-musl-gcc
          CXX_aarch64_unknown_linux_musl: aarch64-linux-musl-g++
          AR_aarch64_unknown_linux_musl: aarch64-linux-musl-ar
          RUSTFLAGS: "-C target-feature=+crt-static"
      - uses: actions/upload-artifact@v4
        with:
          name: l64tool-linux-aarch64
          path: target/aarch64-unknown-linux-musl/release/l64tool

  build-windows:
    name: Windows x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: l64tool-windows-x86_64
          path: target/release/l64tool.exe
